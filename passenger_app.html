
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AzTaxi Passenger</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;background:#0b0b0b;color:white;font-family:sans-serif}
#map{height:90vh}
button{width:100%;padding:15px;background:#FFD600;border:0;font-size:18px}
</style>
</head>
<body>

<div id="map"></div>
<button onclick="requestRide()">Ride çağır</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const map = L.map('map').setView([40.4093,49.8671],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;

map.on("click", e=>{
 if(marker) map.removeLayer(marker);
 marker = L.marker(e.latlng).addTo(map);
 window.pickup=e.latlng;
});

const socket = io("https://aztaxi.onrender.com");

function requestRide(){
 if(!pickup){alert("Xəritədə pickup seç");return;}
 fetch("https://aztaxi.onrender.com/ride/request",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   passengerId:"p1",
   pickupLat:pickup.lat,
   pickupLng:pickup.lng
  })
 });
}
</script>

</body>
</html>
