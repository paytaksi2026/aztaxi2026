
<!DOCTYPE html>
<html>
<head>
<title>Sürücü Qeydiyyat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>🚖 Sürücü Qeydiyyat</h2>

<input type="text" id="name" placeholder="Ad Soyad">
<input type="text" id="car_brand" placeholder="Avtomobil Markası">
<input type="text" id="car_model" placeholder="Model">
<input type="text" id="car_plate" placeholder="Dövlət qeydiyyat nömrəsi">
<input type="text" id="car_color" placeholder="Rəngi">

<div class="phone-row">
<input value="+994" readonly class="code">
<select id="operator">
<option value="50">50</option>
<option value="51">51</option>
<option value="55">55</option>
<option value="70">70</option>
<option value="77">77</option>
<option value="99">99</option>
</select>
<input type="text" id="number" maxlength="7" placeholder="XXXXXXX">
</div>

<input type="password" id="password" placeholder="Şifrə">

<button onclick="register()">Qeydiyyat</button>
<div id="result"></div>
</div>

<script>
async function register(){
const name=document.getElementById("name").value;
const car_brand=document.getElementById("car_brand").value;
const car_model=document.getElementById("car_model").value;
const car_plate=document.getElementById("car_plate").value;
const car_color=document.getElementById("car_color").value;
const operator=document.getElementById("operator").value;
const number=document.getElementById("number").value;
const password=document.getElementById("password").value;

const phone="+994"+operator+number;

const res=await fetch("/api/register/driver",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,password,car_brand,car_model,car_plate,car_color})
});

const data=await res.json();

if(data.success){
document.getElementById("result").innerHTML=
"<p>Qeydiyyat qəbul edildi. Admin təsdiqi gözlənilir.</p>";
}else{
document.getElementById("result").innerText=data.error;
}
}
</script>
</body>
</html>
