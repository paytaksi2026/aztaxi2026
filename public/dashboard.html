
<!DOCTYPE html>
<html>
<head>
    <title>AZTaxi Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h2>Dashboard</h2>
    <button onclick="getProfile()">Profilim</button>
    <button onclick="logout()">Çıxış</button>
    <pre id="profile"></pre>
</div>
<script>
async function getProfile() {
    const token = localStorage.getItem("token");
    const res = await fetch("/api/profile", {
        headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    document.getElementById("profile").textContent = JSON.stringify(data, null, 2);
}
function logout(){
    localStorage.removeItem("token");
    window.location.href = "passenger-login.html";
}
</script>
</body>
</html>
