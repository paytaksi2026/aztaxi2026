
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AZTAXI Passenger</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/css/map_v4.css"/>
</head>
<body>

<div class="topbar">
  <div class="driver-info">
    <span>Sürücü: -</span>
    <span>Balans: 0 AZN</span>
    <span>Status: Offline</span>
  </div>
</div>

<div class="map-wrapper">
  <div id="map"></div>
</div>

<div class="bottom-panel">
  <input id="from" placeholder="Haradan"/>
  <input id="to" placeholder="Haraya"/>
  <button onclick="calcRoute()">Qiyməti hesabla</button>
  <div class="ride-info">
    Mesafə: <b id="distance">-</b> km |
    Qiymət: <b id="price">-</b> AZN
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/js/map_v4.js"></script>
</body>
</html>
