
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AZTAXI Passenger</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/css/map_v3.css"/>
</head>

<body>

<div class="topbar">
  <div class="driver-info">
    <span id="driverName">Sürücü: -</span>
    <span id="driverBalance">Balans: 0 AZN</span>
    <span id="driverStatus">Status: Offline</span>
  </div>
</div>

<div id="map"></div>

<div class="bottom-panel">
  <input id="from" placeholder="Haradan"/>
  <input id="to" placeholder="Haraya"/>
  <button onclick="calcRoute()">Qiyməti hesabla</button>

  <div class="ride-info">
    <span>Mesafə: <b id="distance">-</b> km</span>
    <span>Qiymət: <b id="price">-</b> AZN</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/js/map_v3.js"></script>

</body>
</html>
