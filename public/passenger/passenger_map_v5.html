
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AZTAXI Passenger</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/css/map_v5.css"/>

</head>
<body>

<div class="topbar">
  <div class="logo">🚕 AZTAXI</div>
  <div class="driver-info">
    <span>Sürücü: -</span>
    <span>Balans: 0 AZN</span>
    <span class="status offline">Offline</span>
  </div>
</div>

<div class="main">

  <div class="map-container">
    <div id="map"></div>
  </div>

  <div class="ride-panel">

    <h3>Sifariş</h3>

    <input id="from" placeholder="Haradan"/>
    <input id="to" placeholder="Haraya"/>

    <button onclick="calcRoute()">Qiyməti hesabla</button>

    <div class="ride-info">
      <div>Mesafə</div>
      <b id="distance">-</b> km
    </div>

    <div class="ride-info">
      <div>Qiymət</div>
      <b id="price">-</b> AZN
    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/js/map_v5.js"></script>

</body>
</html>
