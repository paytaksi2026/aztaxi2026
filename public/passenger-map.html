<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AZTaxi Passenger Map</title>

<style>
html, body {
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

.panel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:320px;
z-index:2;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#1976d2;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:8px;
font-size:14px;
}
</style>

</head>

<body>

<div class="panel">

<label>Haradansan</label>
<input id="from">

<label>Haraya</label>
<input id="to">

<div class="result">
<span id="distance"></span><br>
<span id="duration"></span><br>
<b id="price"></b>
</div>

<button onclick="calculate()">Qiyməti Hesabla</button>

</div>

<div id="map"></div>

<script>

let map;
let directionsService;
let directionsRenderer;

function initMap(){

map = new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:{lat:40.4093,lng:49.8671}
});

directionsService = new google.maps.DirectionsService();
directionsRenderer = new google.maps.DirectionsRenderer();

directionsRenderer.setMap(map);

const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");

new google.maps.places.Autocomplete(fromInput);
new google.maps.places.Autocomplete(toInput);

navigator.geolocation.getCurrentPosition(pos=>{
const p = {
lat:pos.coords.latitude,
lng:pos.coords.longitude
};

map.setCenter(p);
});

}

function calculate(){

const from = document.getElementById("from").value;
const to = document.getElementById("to").value;

directionsService.route({
origin:from,
destination:to,
travelMode:"DRIVING"
},function(result,status){

if(status==="OK"){

directionsRenderer.setDirections(result);

const route = result.routes[0].legs[0];

const km = route.distance.value/1000;
const minutes = route.duration.value/60;

document.getElementById("distance").innerHTML =
"Məsafə: "+km.toFixed(2)+" km";

document.getElementById("duration").innerHTML =
"Vaxt: "+minutes.toFixed(0)+" dəq";

let price = 3.50;

if(km>3){
price += (km-3)*0.30;
}

document.getElementById("price").innerHTML =
"Təxmini qiymət: "+price.toFixed(2)+" AZN";

}

});

}

</script>

<script
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCcFSv2hNN_C7WJb6wDEZIRAu2mbe3UMxA&libraries=places&callback=initMap"
async defer>
</script>

</body>
</html>
