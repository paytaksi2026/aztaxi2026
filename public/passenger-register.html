
<!DOCTYPE html>
<html>
<head>
<title>Müştəri Qeydiyyat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>👤 Müştəri Qeydiyyat</h2>

<input type="text" id="name" placeholder="Ad Soyad">

<div class="phone-row">
<input value="+994" readonly class="code">
<select id="operator">
<option value="50">50</option>
<option value="51">51</option>
<option value="55">55</option>
<option value="70">70</option>
<option value="77">77</option>
<option value="99">99</option>
</select>
<input type="text" id="number" maxlength="7" placeholder="XXXXXXX">
</div>

<input type="password" id="password" placeholder="Şifrə">

<button onclick="register()">Qeydiyyat</button>
<div id="result"></div>
</div>

<script>
async function register(){
const name=document.getElementById("name").value;
const operator=document.getElementById("operator").value;
const number=document.getElementById("number").value;
const password=document.getElementById("password").value;

const phone="+994"+operator+number;

const res=await fetch("/api/register/passenger",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,password})
});

const data=await res.json();

if(data.token){
localStorage.setItem("token",data.token);
document.getElementById("result").innerHTML=
"<p>Qeydiyyat uğurlu</p><pre>"+JSON.stringify(data.user,null,2)+"</pre><button onclick='go()'>Daxil ol</button>";
}else{
document.getElementById("result").innerText=data.error;
}
}

function go(){ window.location="/dashboard.html"; }
</script>
</body>
</html>
