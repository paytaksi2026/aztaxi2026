<!DOCTYPE html>
<html>
<head>
<title>AZTaxi Passenger Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>Passenger Register</h2>
<input type="text" id="name" placeholder="Ad">
<div style="display:flex; gap:5px;">
<input value="+994" readonly style="width:70px;">
<select id="operator">
<option value="50">50</option>
<option value="51">51</option>
<option value="55">55</option>
<option value="70">70</option>
<option value="77">77</option>
<option value="99">99</option>
</select>
<input type="text" id="number" maxlength="7" placeholder="XXXXXXX">
</div>
<input type="password" id="password" placeholder="Şifrə">
<button onclick="register()">Qeydiyyat</button>
<p id="msg"></p>
</div>
<script>
async function register(){
const name=document.getElementById("name").value;
const operator=document.getElementById("operator").value;
const number=document.getElementById("number").value;
const password=document.getElementById("password").value;
const phone="+994"+operator+number;
const res=await fetch("/api/register/passenger",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,phone,password})});
const data=await res.json();
document.getElementById("msg").innerText=data.error||"Uğurlu qeydiyyat";
}
</script>
</body>
</html>
